<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wayray thee Lyon</title>
<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(120deg, #000, #111, #1a1a1a);
        color: white;
        overflow-x: hidden;
    }

    header {
        text-align: center;
        padding: 20px;
    }

    img {
        width: 220px;
        border-radius: 20px;
        box-shadow: 0 0 20px #00ffcc;
        animation: float 4s ease-in-out infinite;
    }

    @keyframes float {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-10px); }
        100% { transform: translateY(0px); }
    }

    .typing {
        font-size: 18px;
        max-width: 900px;
        margin: auto;
        padding: 20px;
        line-height: 1.6;
        white-space: pre-wrap;
    }

    .dropdown {
        text-align: center;
        margin: 20px;
    }

    select {
        padding: 10px;
        border-radius: 10px;
        border: none;
        font-size: 16px;
    }

    .book {
        text-align: center;
        margin-top: 30px;
    }

    .book img {
        width: 180px;
        cursor: pointer;
        transition: 0.3s;
    }

    .book img:hover {
        transform: scale(1.1);
    }

    footer {
        text-align: center;
        margin-top: 40px;
        padding: 20px;
        color: #aaa;
    }
</style>
</head>

<body>

<header>
    <h1>Wayray thee Lyon</h1>
    <img src="way.png" alt="Wayray thee Lyon">
</header>

<div class="typing" id="text"></div>

<div class="dropdown">
    <h3>Upcoming Music</h3>
    <select onchange="openLink(this.value)">
        <option value="">Select Song</option>
        <option value="https://ditto.fm/the-one-wayray">The One</option>
        <option value="https://ditto.fm/who-could-have-thought-wayray">Who Could Have Thought</option>
    </select>
</div>

<div class="book">
    <a href="bookings.html">
        <img src="way.png" alt="Book Wayray">
    </a>
    <p>Click image to book Wayray / Chat with AI</p>
</div>

<audio autoplay loop>
    <source src="throne.mp3" type="audio/mpeg">
</audio>

<footer>
    © Wayray thee Lyon | Pretoria, South Africa
</footer>

<script>
const text = `
Artist Name: Wayray thee Lyon
Real Name: Thulane Zwelithini Nonyane
Genre: Hip Hop | Afro Pop
Origin: Pretoria, South Africa

Wayray thee Lyon is a South African Hip Hop and Afro-Pop artist born and raised in Mabopane Block EW, Pretoria. Emerging from an informal settlement environment, he represents a story of resilience, ambition, and self-belief shaped by real-life experiences in the streets of Pretoria.

Raised by his late grandmother, Sarah Stokie Moeletse, Wayray developed discipline and direction from an early age, with strong values that continue to influence his music and mindset today.

He attended Sello Primary School (Patric Moloto Primary School) and M.H. Baloyi Secondary School, where he discovered passion for Dramatic Arts and Business Studies.

Influences: AKA, Nasty C, Cassper Nyovest, Kwesta, Birdman.

Core Identity: Story-driven Hip Hop / Afro-Pop artist with emotional storytelling and street motivation.
`;

let i = 0;
function typeWriter() {
    if (i < text.length) {
        document.getElementById("text").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeWriter, 25);
    }
}
typeWriter();

function openLink(url) {
    if (url) window.open(url, "_blank");
}
</script>

</body>
</html>
