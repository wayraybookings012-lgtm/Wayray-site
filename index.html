<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wayray thee Lyon</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(120deg, #000, #111, #1a1a1a);
        color: white;
    }

    header {
        text-align: center;
        padding: 20px;
    }

    img {
        width: 220px;
        border-radius: 20px;
        box-shadow: 0 0 20px #00ffcc;
    }

    /* RIGHT MENU ICON */
    .menu-container {
        position: fixed;
        top: 10px;
        right: 10px;
        z-index: 999;
    }

    .menu-icon {
        width: 40px;
        cursor: pointer;
        background: white;
        padding: 5px;
        border-radius: 6px;
    }

    /* DROPDOWN */
    .dropdown {
        display: none;
        position: absolute;
        right: 0;
        margin-top: 10px;
        background: white;
        border-radius: 8px;
        overflow: hidden;
        min-width: 180px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    }

    .dropdown select {
        width: 100%;
        padding: 10px;
        border: none;
        background: white;
        color: black;
        font-size: 14px;
        outline: none;
    }

    .content {
        max-width: 900px;
        margin: auto;
        padding: 20px;
        line-height: 1.6;
        white-space: pre-wrap;
    }

    .book {
        text-align: center;
        margin-top: 30px;
    }

    .book img {
        width: 180px;
        cursor: pointer;
        transition: 0.3s;
    }

    .book img:hover {
        transform: scale(1.05);
    }

    footer {
        text-align: center;
        margin-top: 40px;
        padding: 20px;
        color: #aaa;
    }
</style>
</head>

<body>

<!-- RIGHT MENU -->
<div class="menu-container">
    <img src="menu.png" class="menu-icon" onclick="toggleMenu()">

    <div class="dropdown" id="dropdownMenu">
        <select onchange="openLink(this.value)">
            <option value="">Menu</option>
            <option value="https://ditto.fm/the-one-wayray">The One</option>
            <option value="https://ditto.fm/who-could-have-guessed-it">Who Could Have Guessed It</option>
            <option value="https://ditto.fm/wayray-ft-wayray-who-could-have-guessed-it-re-made">Remade Track</option>
            <option value="https://ditto.fm/love-for-us">Love For Us</option>
        </select>
    </div>
</div>

<header>
    <h1>Wayray thee Lyon</h1>
    <img src="way.png" alt="Wayray thee Lyon">
</header>

<div class="content">
Artist Name: Wayray thee Lyon
Real Name: Thulane Zwelithini Nonyane
Genre: Hip Hop | Afro Pop
Origin: Pretoria, South Africa
</div>

<div class="book">
    <a href="bookings.html">
        <img src="bot.png" alt="Book Wayray">
    </a>
    <p>Click image to book Wayray / Chat with AI</p>
</div>

<audio autoplay loop>
    <source src="throne.mp3" type="audio/mpeg">
</audio>

<footer>
    © Wayray thee Lyon | Pretoria, South Africa
</footer>

<script>
function toggleMenu() {
    const menu = document.getElementById("dropdownMenu");
    menu.style.display = (menu.style.display === "block") ? "none" : "block";
}

function openLink(url) {
    if (url) window.open(url, "_blank");
}
</script>

</body>
</html>
